<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSPaint</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Super Scuffed Paint</h1>
    <div class="layout">
    <fieldset>
        <fieldset>
            <legend>Drawing</legend>
            <input id="pencil-color" type="color" id="picker">
            <button id="pencil">Pencil</button>
            <input id="pencil-size" type="number" value="5" min="1" max="50" placeholder="px">
            <button id="eraser">Eraser</button>
            <button id="fill">Fill</button>
        </fieldset>
        <fieldset>
            <legend>Shapes</legend>
            <button id="line">Line</button>
            <button id="rectangle">Rectangle</button>
            <button id="circle">Circle</button>
        </fieldset>
        <fieldset>
            <legend>Canvas</legend>
            <button id="reset">Reset</button>
        </fieldset>
        <fieldset>
            <legend>Files</legend>
            <button id="reset">Save As</button>
            <button id="save">Save</button>
            <button id="load">Load</button>
        </fieldset>
        <p>
            x: <span id="x-coord">0</span> y: <span id="y-coord">0</span> <br>
            Tool: <span id="current-tool"></span>
        </p>
    </fieldset>
        <canvas id="canvas" width="800" height="500"></canvas>

    </div>
    <script src="script.js"></script>
</body>
</html>
