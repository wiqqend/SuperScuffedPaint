<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSPaint</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Super Scuffed Paint</h1>
    <div class="layout">
    <fieldset>
        <fieldset>
            <legend>Drawing</legend>
            <input class="form-control" id="pen-color" type="color" id="picker">
            <button class="tool-btn" data-tool="pen">Pen</button>
            <input class="form-control" id="pen-size" type="number" value="5" min="1" max="50" placeholder="px">
            <button class="tool-btn" data-tool="eraser">Eraser</button>
            <button class="tool-btn" data-tool="fill">Fill</button>
        </fieldset>
        <fieldset>
            <legend>Shapes</legend>
            <button class="tool-btn" data-tool="line">Line</button>
            <button class="tool-btn" data-tool="rectangle">Rectangle</button>
            <button class="tool-btn" data-tool="circle">Circle</button>
        </fieldset>
        <fieldset>
            <legend>Canvas</legend>
            <button class="tool-btn" id='reset-canvas'data-tool="reset">Reset</button>
            <input class="form-control" type="number" id="canvas-width" value="800" min="100" max="2560" placeholder="Width">
            <input class="form-control" type="number" id="canvas-height" value="500" min="100" max="1440" placeholder="Height">
            <button class="tool-btn" data-tool="resize" id="btn-resize">Resize</button>
        </fieldset>
        <fieldset>
            <legend>Files</legend>
            <button class="tool-btn" data-tool="save-as" id="btn-save-as">Save PNG</button>
            <button class="tool-btn" data-tool="save" id="btn-save">Save</button>
            <button class="tool-btn" data-tool="load" id="btn-load">Load</button>
        </fieldset>
        <div id="statusbar">
            <span id="status-tool">Tool: Pen</span><br> 
            <span id="status-coords">X: 0, Y: 0</span><br>
            <span id="status-size">Size: 5px</span><br>
        </div>
    </fieldset>
    </div>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
